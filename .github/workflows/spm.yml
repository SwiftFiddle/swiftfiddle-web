name: Update Package.resolved
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Fetch the project template on the host runner; the swift:6.3-jammy
      # image has no curl.
      - name: Fetch Package.swift template
        run: |
          set -ex

          mkdir -p .template
          curl -sfL -o .template/Package.swift https://raw.github.com/swiftfiddle/swiftfiddle-lsp/main/Resources/ProjectTemplate/Package.swift
      # Resolve and build inside the same toolchain the app ships on
      # (swift:6.3-jammy, see Dockerfile) so the generated Package.resolved is
      # validated against production. The previous macOS Swift.org toolchain
      # bundled a Foundation that lacks APIs used by transitive dependencies,
      # causing spurious build failures.
      - name: Update Package.swift.json and resolve packages
        run: |
          set -ex

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            swift:6.3-jammy \
            bash -c '
              set -ex

              swift package --package-path .template dump-package > Resources/Package.swift.json

              swift package update
              swift build
            '
      - name: Clean up template
        if: always()
        run: rm -rf .template
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          base: "master"
          commit-message: "Update Swift Packages"
          title: "Update Swift Packages"
          add-paths: |
            Resources/Package.swift.json
            Package.resolved
      - name: Enable Pull Request Automerge
        if: ${{ steps.cpr.outputs.pull-request-url }}
        run: gh pr merge --merge --auto ${{ steps.cpr.outputs.pull-request-url }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
